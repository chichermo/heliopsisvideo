<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Heliopsis Video - Reproductor Simple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .status {
            font-size: 1.2em;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .video-container {
            margin: 30px 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        video {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff4444;
            color: #ffcccc;
        }
        
        .success {
            background: rgba(0, 255, 0, 0.2);
            border: 2px solid #44ff44;
            color: #ccffcc;
        }
        
        .loading {
            background: rgba(255, 255, 0, 0.2);
            border: 2px solid #ffff44;
            color: #ffffcc;
        }
        
        .progress {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .email-form {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            display: none;
        }
        
        .email-input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .email-input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .validate-button {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .validate-button:hover {
            transform: scale(1.05);
        }
        
        .email-info {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #4CAF50;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎬 Heliopsis Video</div>
        
        <div class="status loading" id="status">
            🔄 Verificando acceso...
        </div>
        
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="email-form" id="emailForm">
            <h3>🔐 Verificación de Acceso</h3>
            <p>Por favor, ingresa tu email y contraseña para verificar el acceso:</p>
            <input type="email" class="email-input" id="emailInput" placeholder="tu@email.com" required>
            <input type="password" class="email-input" id="passwordInput" placeholder="Contraseña" required>
            <button class="validate-button" onclick="validateAccess()">✅ Verificar Acceso</button>
        </div>
        
        <div class="email-info" id="emailInfo">
            <h4>✅ Email Verificado</h4>
            <p id="emailText"></p>
        </div>
        
        <div class="video-container" id="videoContainer" style="display: none;">
            <video id="videoPlayer" controls>
                Tu navegador no soporta video HTML5.
            </video>
        </div>
    </div>

    <script>
        // Extraer token de la URL
        const token = window.location.pathname.split('/').pop();
        
        console.log('🔑 Token extraído:', token);
        
        // Función para actualizar estado
        function updateStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }
        
        // Función para actualizar progreso
        function updateProgress(percent) {
            document.getElementById('progressBar').style.width = percent + '%';
        }
        
        // Función para verificar acceso
        async function checkAccess() {
            try {
                updateStatus('🔐 Verificando acceso...', 'loading');
                updateProgress(20);
                
                const response = await fetch(`/api/video-simple/check-simple/${token}`);
                const result = await response.json();
                
                updateProgress(60);
                
                if (result.success && result.valid) {
                    updateStatus(`✅ Acceso confirmado para: ${result.email}`, 'success');
                    updateProgress(100);
                    
                    // Mostrar formulario de email para validación
                    showEmailForm(result.email);
                    
                } else {
                    updateStatus('❌ Acceso denegado: Token inválido o agotado', 'error');
                }
                
            } catch (error) {
                console.error('Error verificando acceso:', error);
                updateStatus('❌ Error verificando acceso', 'error');
            }
        }
        
        // Función para mostrar formulario de email
        function showEmailForm(authorizedEmail) {
            updateStatus('🔐 Verificación de acceso requerida', 'loading');
            
            const emailForm = document.getElementById('emailForm');
            const emailInput = document.getElementById('emailInput');
            const passwordInput = document.getElementById('passwordInput');
            
            // Mostrar formulario
            emailForm.style.display = 'block';
            
            // NO mostrar el email autorizado - mantener placeholder genérico
            emailInput.placeholder = 'tu@email.com';
            
            // Enfocar el input de email
            emailInput.focus();
        }
        
        // Función para validar email
        async function validateAccess() {
            const emailInput = document.getElementById('emailInput');
            const passwordInput = document.getElementById('passwordInput');
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!email) {
                alert('Por favor, ingresa tu email');
                return;
            }
            
            if (!email.includes('@')) {
                alert('Por favor, ingresa un email válido');
                return;
            }

            if (!password) {
                alert('Por favor, ingresa tu contraseña');
                return;
            }
            
            try {
                updateStatus('🔐 Validando acceso...', 'loading');
                
                const response = await fetch(`/api/video-simple/check-simple/${token}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email, password: password })
                });
                
                const result = await response.json();
                
                if (result.success && result.accessValidated) {
                    updateStatus('✅ Acceso validado correctamente', 'success');
                    showEmailInfo(email);
                    
                    // Ocultar formulario
                    document.getElementById('emailForm').style.display = 'none';
                    
                    // Mostrar video después de 1 segundo
                    setTimeout(() => {
                        loadVideo();
                    }, 1000);
                    
                } else {
                    updateStatus('❌ Acceso denegado: Email o contraseña incorrectos', 'error');
                    emailInput.style.border = '2px solid #ff4444';
                    passwordInput.style.border = '2px solid #ff4444';
                    
                    // Limpiar borde después de 3 segundos
                    setTimeout(() => {
                        emailInput.style.border = 'none';
                        passwordInput.style.border = 'none';
                    }, 3000);
                }
                
            } catch (error) {
                console.error('Error validando acceso:', error);
                updateStatus('❌ Error validando acceso', 'error');
            }
        }
        
        // Función para mostrar información del email
        function showEmailInfo(email) {
            const emailInfo = document.getElementById('emailInfo');
            const emailText = document.getElementById('emailText');
            
            emailText.textContent = `Acceso autorizado para: ${email}`;
            emailInfo.style.display = 'block';
        }
        
        // Función para cargar video
        function loadVideo() {
            updateStatus('🎬 Cargando video...', 'loading');
            
            const videoContainer = document.getElementById('videoContainer');
            const videoPlayer = document.getElementById('videoPlayer');
            
            // Configurar fuente del video
            videoPlayer.src = `/api/video-simple/stream-simple/${token}`;
            
            // Mostrar contenedor
            videoContainer.style.display = 'block';
            
            // Eventos del video
            videoPlayer.addEventListener('loadstart', () => {
                updateStatus('🎬 Iniciando reproducción...', 'success');
            });
            
            videoPlayer.addEventListener('canplay', () => {
                updateStatus('✅ Video listo para reproducir', 'success');
            });
            
            videoPlayer.addEventListener('error', (e) => {
                console.error('Error en video:', e);
                updateStatus('❌ Error reproduciendo video', 'error');
            });
            
            // Intentar reproducir
            videoPlayer.play().catch(e => {
                console.log('Autoplay bloqueado, usuario debe hacer clic');
            });
        }
        
        // Permitir validar con Enter
        document.getElementById('emailInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                validateAccess();
            }
        });

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                validateAccess();
            }
        });
        
        // Iniciar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 DOM cargado, iniciando aplicación simple...');
            checkAccess();
        });
    </script>
</body>
</html>
