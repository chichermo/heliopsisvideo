<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Heliopsis Video - Reproductor Simple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .status {
            font-size: 1.2em;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .video-container {
            margin: 30px 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        video {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff4444;
            color: #ffcccc;
        }
        
        .success {
            background: rgba(0, 255, 0, 0.2);
            border: 2px solid #44ff44;
            color: #ccffcc;
        }
        
        .loading {
            background: rgba(255, 255, 0, 0.2);
            border: 2px solid #ffff44;
            color: #ffffcc;
        }
        
        .progress {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎬 Heliopsis Video</div>
        
        <div class="status loading" id="status">
            🔄 Verificando acceso...
        </div>
        
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="video-container" id="videoContainer" style="display: none;">
            <video id="videoPlayer" controls>
                Tu navegador no soporta video HTML5.
            </video>
        </div>
    </div>

    <script>
        // Extraer token de la URL
        const token = window.location.pathname.split('/').pop();
        
        console.log('🔑 Token extraído:', token);
        
        // Función para actualizar estado
        function updateStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }
        
        // Función para actualizar progreso
        function updateProgress(percent) {
            document.getElementById('progressBar').style.width = percent + '%';
        }
        
        // Función para verificar acceso
        async function checkAccess() {
            try {
                updateStatus('🔐 Verificando acceso...', 'loading');
                updateProgress(20);
                
                const response = await fetch(`/api/video-simple/check-simple/${token}`);
                const result = await response.json();
                
                updateProgress(60);
                
                if (result.success && result.valid) {
                    updateStatus(`✅ Acceso confirmado para: ${result.email}`, 'success');
                    updateProgress(100);
                    
                    // Mostrar video después de 1 segundo
                    setTimeout(() => {
                        loadVideo();
                    }, 1000);
                    
                } else {
                    updateStatus('❌ Acceso denegado: Token inválido o agotado', 'error');
                }
                
            } catch (error) {
                console.error('Error verificando acceso:', error);
                updateStatus('❌ Error verificando acceso', 'error');
            }
        }
        
        // Función para cargar video
        function loadVideo() {
            updateStatus('🎬 Cargando video...', 'loading');
            
            const videoContainer = document.getElementById('videoContainer');
            const videoPlayer = document.getElementById('videoPlayer');
            
            // Configurar fuente del video
            videoPlayer.src = `/api/video-simple/stream-simple/${token}`;
            
            // Mostrar contenedor
            videoContainer.style.display = 'block';
            
            // Eventos del video
            videoPlayer.addEventListener('loadstart', () => {
                updateStatus('🎬 Iniciando reproducción...', 'success');
            });
            
            videoPlayer.addEventListener('canplay', () => {
                updateStatus('✅ Video listo para reproducir', 'success');
            });
            
            videoPlayer.addEventListener('error', (e) => {
                console.error('Error en video:', e);
                updateStatus('❌ Error reproduciendo video', 'error');
            });
            
            // Intentar reproducir
            videoPlayer.play().catch(e => {
                console.log('Autoplay bloqueado, usuario debe hacer clic');
            });
        }
        
        // Iniciar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 DOM cargado, iniciando aplicación simple...');
            checkAccess();
        });
    </script>
</body>
</html>
