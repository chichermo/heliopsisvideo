<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Heliopsis Video - Reproductor Simple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .status {
            font-size: 1.2em;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .video-container {
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        #videoPlayer {
            width: 100%;
            height: auto;
            border-radius: 10px;
            background: #000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        /* Estilos para los controles del video */
        #videoPlayer::-webkit-media-controls {
            background: rgba(0, 0, 0, 0.7);
        }
        
        #videoPlayer::-webkit-media-controls-panel {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
        }
        
        #videoPlayer::-webkit-media-controls-play-button {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
        }
        
        #videoPlayer::-webkit-media-controls-timeline {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
        }
        
        #videoPlayer::-webkit-media-controls-current-time-display,
        #videoPlayer::-webkit-media-controls-time-remaining-display {
            color: white;
            font-weight: bold;
        }
        
        #videoPlayer::-webkit-media-controls-volume-slider {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff4444;
            color: #ffcccc;
        }
        
        .success {
            background: rgba(0, 255, 0, 0.2);
            border: 2px solid #44ff44;
            color: #ccffcc;
        }
        
        .loading {
            background: rgba(255, 255, 0, 0.2);
            border: 2px solid #ffff44;
            color: #ffffcc;
        }
        
        .progress {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .email-form {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            display: none;
        }
        
        .email-input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .email-input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .validate-button {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .validate-button:hover {
            transform: scale(1.05);
        }
        
        .email-info {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #4CAF50;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            display: none;
        }

        /* Controles personalizados */
        .custom-controls {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            text-align: center;
        }
        
        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .control-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .control-btn:active {
            transform: translateY(0);
        }
        
        .video-info {
            color: white;
            font-size: 14px;
            font-family: monospace;
        }
        
        .video-info span {
            margin: 0 5px;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .keyboard-help {
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            font-style: italic;
        }
        
        .keyboard-help small {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎬 Heliopsis Video</div>
        
        <div class="status loading" id="status">
            🔄 Verificando acceso...
        </div>
        
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="email-form" id="emailForm">
            <h3>🔐 Verificación de Acceso</h3>
            <p>Por favor, ingresa tu email y contraseña para verificar el acceso:</p>
            <input type="email" class="email-input" id="emailInput" placeholder="tu@email.com" required>
            <input type="password" class="email-input" id="passwordInput" placeholder="Contraseña" required>
            <button class="validate-button" onclick="validateAccess()">✅ Verificar Acceso</button>
        </div>
        
        <div class="email-info" id="emailInfo">
            <h4>✅ Email Verificado</h4>
            <p id="emailText"></p>
        </div>
        
        <div class="video-container" id="videoContainer" style="display: none;">
            <video id="videoPlayer" controls preload="metadata" style="display: none;">
                <source id="videoSource" src="" type="video/mp4">
                Tu navegador no soporta el elemento de video.
            </video>
            
            <!-- Controles adicionales personalizados -->
            <div class="custom-controls" id="customControls" style="display: none;">
                <div class="control-buttons">
                    <button onclick="skipBackward()" class="control-btn" title="Retroceder 10s (←)">⏪ -10s</button>
                    <button onclick="skipForward()" class="control-btn" title="Adelantar 10s (→)">+10s ⏩</button>
                    <button onclick="toggleFullscreen()" class="control-btn" title="Pantalla completa (F)">⛶</button>
                    <button onclick="toggleMute()" class="control-btn" title="Silenciar (M)">🔊</button>
                </div>
                <div class="video-info">
                    <span id="currentTime">00:00</span> / <span id="totalTime">00:00</span>
                    <span id="videoProgress">0%</span>
                </div>
                <div class="keyboard-help">
                    <small>💡 Atajos: Espacio/K (Play/Pause) | ← → (10s) | ↑ ↓ (Volumen) | F (Pantalla completa) | M (Silenciar)</small>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Extraer token de la URL
        const token = window.location.pathname.split('/').pop();
        
        console.log('🔑 Token extraído:', token);
        
        // Función para actualizar estado
        function updateStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }
        
        // Función para actualizar progreso
        function updateProgress(percent) {
            document.getElementById('progressBar').style.width = percent + '%';
        }
        
        // Función para verificar acceso
        async function checkAccess() {
            try {
                updateStatus('🔐 Verificando acceso...', 'loading');
                updateProgress(20);
                
                const response = await fetch(`/api/video-simple/check-simple/${token}`);
                const result = await response.json();
                
                updateProgress(60);
                
                if (result.success && result.valid) {
                    updateStatus(`✅ Acceso confirmado para: ${result.email}`, 'success');
                    updateProgress(100);
                    
                    // Mostrar formulario de email para validación
                    showEmailForm(result.email);
                    
                } else {
                    updateStatus('❌ Acceso denegado: Token inválido o agotado', 'error');
                }
                
            } catch (error) {
                console.error('Error verificando acceso:', error);
                updateStatus('❌ Error verificando acceso', 'error');
            }
        }
        
        // Función para mostrar formulario de email
        function showEmailForm(authorizedEmail) {
            updateStatus('🔐 Verificación de acceso requerida', 'loading');
            
            const emailForm = document.getElementById('emailForm');
            const emailInput = document.getElementById('emailInput');
            const passwordInput = document.getElementById('passwordInput');
            
            // Mostrar formulario
            emailForm.style.display = 'block';
            
            // NO mostrar el email autorizado - mantener placeholder genérico
            emailInput.placeholder = 'tu@email.com';
            
            // Enfocar el input de email
            emailInput.focus();
        }
        
        // Función para validar email
        async function validateAccess() {
            const emailInput = document.getElementById('emailInput');
            const passwordInput = document.getElementById('passwordInput');
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!email) {
                alert('Por favor, ingresa tu email');
                return;
            }
            
            if (!email.includes('@')) {
                alert('Por favor, ingresa un email válido');
                return;
            }

            if (!password) {
                alert('Por favor, ingresa tu contraseña');
                return;
            }
            
            try {
                updateStatus('🔐 Validando acceso...', 'loading');
                
                const response = await fetch(`/api/video-simple/check-simple/${token}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email, password: password })
                });
                
                const result = await response.json();
                
                if (result.success && result.accessValidated) {
                    updateStatus('✅ Acceso validado correctamente', 'success');
                    showEmailInfo(email);
                    
                    // Ocultar formulario
                    document.getElementById('emailForm').style.display = 'none';
                    
                    // Mostrar video después de 1 segundo
                    setTimeout(() => {
                        loadVideo();
                    }, 1000);
                    
                } else {
                    updateStatus('❌ Acceso denegado: Email o contraseña incorrectos', 'error');
                    emailInput.style.border = '2px solid #ff4444';
                    passwordInput.style.border = '2px solid #ff4444';
                    
                    // Limpiar borde después de 3 segundos
                    setTimeout(() => {
                        emailInput.style.border = 'none';
                        passwordInput.style.border = 'none';
                    }, 3000);
                }
                
            } catch (error) {
                console.error('Error validando acceso:', error);
                updateStatus('❌ Error validando acceso', 'error');
            }
        }
        
        // Función para mostrar información del email
        function showEmailInfo(email) {
            const emailInfo = document.getElementById('emailInfo');
            const emailText = document.getElementById('emailText');
            
            emailText.textContent = `Acceso autorizado para: ${email}`;
            emailInfo.style.display = 'block';
        }
        
        // Función para cargar el video
        function loadVideo() {
            const videoPlayer = document.getElementById('videoPlayer');
            const videoContainer = document.getElementById('videoContainer');
            const emailForm = document.getElementById('emailForm');
            const customControls = document.getElementById('customControls');
            
            // Ocultar formulario y mostrar contenedor de video
            emailForm.style.display = 'none';
            videoContainer.style.display = 'block';
            videoPlayer.style.display = 'block';
            customControls.style.display = 'block';
            
            // Configurar la fuente del video
            const videoSource = document.getElementById('videoSource');
            videoSource.src = `/api/video-simple/stream-simple/${token}`;
            
            // Recargar el video para aplicar la nueva fuente
            videoPlayer.load();
            
            // Configurar eventos del video
            videoPlayer.addEventListener('loadstart', () => {
                updateStatus('🔄 Cargando video...', 'loading');
            });
            
            videoPlayer.addEventListener('canplay', () => {
                updateStatus('✅ Video listo para reproducir', 'success');
                updateProgress(100);
                updateVideoInfo(); // Actualizar información inicial
            });
            
            videoPlayer.addEventListener('play', () => {
                updateStatus('▶️ Reproduciendo video', 'success');
            });
            
            videoPlayer.addEventListener('pause', () => {
                updateStatus('⏸️ Video pausado', 'info');
            });
            
            videoPlayer.addEventListener('ended', () => {
                updateStatus('🏁 Video finalizado', 'info');
            });
            
            videoPlayer.addEventListener('error', (e) => {
                console.error('Error en video:', e);
                updateStatus('❌ Error cargando video', 'error');
            });
            
            videoPlayer.addEventListener('waiting', () => {
                updateStatus('⏳ Buffering...', 'loading');
            });
            
            videoPlayer.addEventListener('stalled', () => {
                updateStatus('⚠️ Conexión lenta', 'warning');
            });
            
            // Evento para actualizar información de tiempo
            videoPlayer.addEventListener('timeupdate', () => {
                updateVideoInfo();
            });
            
            // Evento para cuando se carga la duración
            videoPlayer.addEventListener('loadedmetadata', () => {
                updateVideoInfo();
            });
            
            // Intentar reproducir automáticamente
            videoPlayer.play().catch(error => {
                console.log('Reproducción automática bloqueada:', error);
                updateStatus('▶️ Haz clic en reproducir para comenzar', 'info');
            });
        }
        
        // Permitir validar con Enter
        document.getElementById('emailInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                validateAccess();
            }
        });

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                validateAccess();
            }
        });
        
        // Iniciar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 DOM cargado, iniciando aplicación simple...');
            checkAccess();
        });

        // Funciones para controles personalizados
        function skipBackward() {
            const video = document.getElementById('videoPlayer');
            video.currentTime = Math.max(0, video.currentTime - 10);
        }
        
        function skipForward() {
            const video = document.getElementById('videoPlayer');
            video.currentTime = Math.min(video.duration, video.currentTime + 10);
        }
        
        function toggleFullscreen() {
            const video = document.getElementById('videoPlayer');
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            } else if (video.msRequestFullscreen) {
                video.msRequestFullscreen();
            }
        }
        
        function toggleMute() {
            const video = document.getElementById('videoPlayer');
            video.muted = !video.muted;
            const muteBtn = document.querySelector('.control-btn[title="Silenciar"]');
            muteBtn.textContent = video.muted ? '🔇' : '🔊';
            muteBtn.title = video.muted ? 'Activar sonido' : 'Silenciar';
        }
        
        // Función para actualizar información del video
        function updateVideoInfo() {
            const video = document.getElementById('videoPlayer');
            const currentTimeSpan = document.getElementById('currentTime');
            const totalTimeSpan = document.getElementById('totalTime');
            const progressSpan = document.getElementById('videoProgress');
            
            if (video.duration && !isNaN(video.duration)) {
                const currentTime = Math.floor(video.currentTime);
                const totalTime = Math.floor(video.duration);
                const progress = Math.round((video.currentTime / video.duration) * 100);
                
                currentTimeSpan.textContent = formatTime(currentTime);
                totalTimeSpan.textContent = formatTime(totalTime);
                progressSpan.textContent = `${progress}%`;
            }
        }
        
        // Función para formatear tiempo
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        // Atajos de teclado para controles
        document.addEventListener('keydown', function(e) {
            const video = document.getElementById('videoPlayer');
            
            // Solo aplicar atajos si el video está cargado
            if (!video.src) return;
            
            switch(e.key) {
                case ' ':
                case 'k':
                    e.preventDefault();
                    if (video.paused) {
                        video.play();
                    } else {
                        video.pause();
                    }
                    break;
                    
                case 'ArrowLeft':
                    e.preventDefault();
                    skipBackward();
                    break;
                    
                case 'ArrowRight':
                    e.preventDefault();
                    skipForward();
                    break;
                    
                case 'ArrowUp':
                    e.preventDefault();
                    video.volume = Math.min(1, video.volume + 0.1);
                    break;
                    
                case 'ArrowDown':
                    e.preventDefault();
                    video.volume = Math.max(0, video.volume - 0.1);
                    break;
                    
                case 'f':
                    e.preventDefault();
                    toggleFullscreen();
                    break;
                    
                case 'm':
                    e.preventDefault();
                    toggleMute();
                    break;
                    
                case '0':
                case 'Home':
                    e.preventDefault();
                    video.currentTime = 0;
                    break;
                    
                case 'End':
                    e.preventDefault();
                    video.currentTime = video.duration;
                    break;
            }
        });
    </script>
</body>
</html>
